<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YT Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --red: #ff2d2d;
      --red-dim: #ff2d2d22;
      --text: #f0f0f0;
      --muted: #555;
      --success: #00e676;
      --error: #ff4444;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, #ff2d2d18 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 0 60px #ff2d2d0a, 0 24px 60px #00000080;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 42px; height: 42px;
      background: var(--red);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: white; }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo-text p {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 3px;
    }

    /* Mode selector */
    .mode-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mode-btn:hover {
      border-color: #333;
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
    }

    .mode-btn svg {
      width: 15px; height: 15px;
      fill: currentColor;
    }

    /* URL input */
    .input-label {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .url-input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 48px 14px 16px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: #444; }

    .clear-btn {
      position: absolute;
      right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      display: flex; align-items: center;
    }

    .clear-btn.visible { opacity: 1; pointer-events: all; }
    .clear-btn svg { width: 16px; height: 16px; fill: currentColor; }

    /* Download button */
    .dl-btn {
      width: 100%;
      padding: 15px;
      background: var(--red);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .dl-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .dl-btn:active:not(:disabled) { transform: translateY(0); }
    .dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .dl-btn svg { width: 17px; height: 17px; fill: white; }

    /* Spinner */
    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status box */
    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .status.success {
      display: block;
      background: #00e67611;
      border: 1px solid #00e67633;
      color: var(--success);
    }

    .status.error {
      display: block;
      background: #ff444411;
      border: 1px solid #ff444433;
      color: var(--error);
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff08;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .status-spinner {
      width: 14px; height: 14px;
      border: 2px solid #444;
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-info {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .save-path {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: #333;
    }
  </style>
</head>
